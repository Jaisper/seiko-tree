<title>The Complete Seiko Mechanical Family Tree 1960–2025</title>

<style>
:root{--suwa:#1e3a5f;--kameido:#7a2332;--diver:#0d6651;--chrono:#9e6b00;--bell:#6d3a7a;--world:#2d7a53;--seiko5:#3d6d1e;--gs:#1a4a6a;--ks:#5a2a4a;--modern:#4a3a1e;--prospex:#0a5a4a;--presage:#3a2a5e;--icon:#b8942e;--coll:#2d8a3e;--bg:#faf9f7;--paper:#fff;--ink:#1a1a1a;--muted:#8a8780;--rule:#e0ddd6;--hibeat:#c92a2a;--springdrive:#1c7ed6;--quartz:#9e9e9e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'IBM Plex Mono',monospace;color:var(--ink);overflow:hidden}
#app{width:100vw;height:100vh;display:flex;flex-direction:column}
#header{padding:10px 20px 8px;border-bottom:1px solid var(--rule);background:var(--paper);z-index:20;flex-shrink:0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#header .eyebrow{font-size:8px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
#header h1{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--ink);letter-spacing:.5px;line-height:1.2}
#header .spacer{flex:1}
.filters{display:flex;gap:3px;flex-wrap:wrap}
.filters button{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:3px 8px;background:transparent;color:var(--muted);border:1px solid var(--rule);border-radius:2px;cursor:pointer;letter-spacing:.3px;transition:all .15s}
.filters button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.filters button:hover:not(.active){border-color:var(--muted);color:var(--ink)}
#toolbar{padding:5px 20px;border-bottom:1px solid var(--rule);background:var(--paper);z-index:20;flex-shrink:0;display:flex;align-items:center;gap:10px}
#toolbar label{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
#zoom-slider{-webkit-appearance:none;appearance:none;width:180px;height:3px;background:var(--rule);border-radius:2px;outline:none;cursor:pointer}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid var(--paper);box-shadow:0 1px 2px rgba(0,0,0,.2)}
#zoom-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid var(--paper)}
#zoom-val{font-size:9px;color:var(--muted);min-width:28px}
#toolbar .sep{width:1px;height:14px;background:var(--rule)}
.tbtn{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 7px;background:transparent;color:var(--muted);border:1px solid var(--rule);border-radius:2px;cursor:pointer}
.tbtn:hover{border-color:var(--ink);color:var(--ink)}
#legend{position:absolute;bottom:6px;left:10px;z-index:15;background:var(--paper);border:1px solid var(--rule);border-radius:3px;padding:5px 10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 6px rgba(0,0,0,.05);max-width:calc(100vw - 200px)}
#legend .item{display:flex;align-items:center;gap:3px}
#legend .dot{width:7px;height:7px;border-radius:1px}
#legend span{font-size:7px;color:var(--muted);letter-spacing:.3px}
#legend .sep{width:1px;height:10px;background:var(--rule);margin:0 2px}
#canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;touch-action:none;background:var(--bg);background-image:radial-gradient(circle,#d8d5ce .4px,transparent .4px);background-size:20px 20px}
#canvas-wrap.dragging{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0}
.section-bg{position:absolute;border-radius:4px;pointer-events:none}
.section-bg .label{position:absolute;top:-8px;left:10px;font-size:8px;letter-spacing:1.5px;font-weight:500;background:var(--bg);padding:0 5px}
.section-bg.sub .label{font-size:7px;letter-spacing:1px;top:-6px;left:6px}
.node{position:absolute;width:124px;min-height:42px;background:var(--paper);border-radius:3px;padding:5px 6px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:default;transition:opacity .2s,border-color .2s,box-shadow .2s;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.node .text{font-size:8.5px;color:var(--ink);line-height:1.25;text-align:center;white-space:pre-line;transition:font-size .15s}
.node.icon{border-width:2px!important}
.node.icon .text{font-weight:600}
.node .bar{width:100%;height:1.5px;margin-top:3px;border-radius:1px;opacity:.4}
.node .star-badge{position:absolute;top:-1px;right:5px;background:var(--icon);color:var(--paper);font-size:6px;padding:0 3px;border-radius:0 0 2px 2px;font-weight:500}
.node .coll-badge{position:absolute;top:-1px;left:5px;background:var(--coll);color:var(--paper);font-size:5.5px;padding:0 3px;border-radius:0 0 2px 2px;font-weight:500;text-transform:uppercase}
.node:hover{box-shadow:0 2px 10px rgba(184,148,46,.12)}
.node:hover .bar{opacity:1}
.node.dimmed{opacity:.1}
.node.hidden-filter{opacity:.04;pointer-events:none}
/* Feature 1: Tech badges */
.tech-badge{position:absolute;bottom:3px;right:4px;width:9px;height:9px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:700;color:#fff;box-shadow:0 0 3px rgba(0,0,0,.15);transition:opacity .2s}
.tech-badge.hibeat{background:var(--hibeat)}
.tech-badge.springdrive{background:linear-gradient(135deg,#1971c2,#22b8cf);animation:sd-pulse 3s ease-in-out infinite}
.tech-badge.quartz{background:var(--quartz)}
@keyframes sd-pulse{0%,100%{box-shadow:0 0 3px rgba(28,126,214,.2)}50%{box-shadow:0 0 8px rgba(28,126,214,.5)}}
/* Feature 2: Semantic zoom */
#canvas.zoom-far .node .text{font-size:7px}
#canvas.zoom-far .tech-badge{opacity:0}
#canvas.zoom-far .coll-badge{opacity:0}
#canvas.zoom-far .star-badge{font-size:5px;padding:0 2px}
#canvas.zoom-far .section-bg.sub{opacity:.3}
/* Feature 3: Minimap */
#minimap{position:absolute;bottom:8px;right:10px;z-index:15;background:var(--paper);border:1px solid var(--rule);border-radius:3px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;cursor:pointer}
#minimap canvas{display:block}
#minimap .viewport{position:absolute;border:1.5px solid var(--icon);background:rgba(184,148,46,.08);border-radius:1px;pointer-events:none}
/* Feature 4: Spring Drive edge animation */
@keyframes march{to{stroke-dashoffset:-16}}
.edge-sd{stroke:var(--springdrive)!important;stroke-dasharray:6 3!important;animation:march 1.2s linear infinite;opacity:.6!important}
#edges-svg{position:absolute;top:0;left:0;pointer-events:none}
</style>
</head>

/* ═══ ENGINE ═══ */
const nodeMap={};nodes.forEach(n=>nodeMap[n[0]]=n);
const canvas=document.getElementById('canvas'),svg=document.getElementById('edges-svg'),wrap=document.getElementById('canvas-wrap'),slider=document.getElementById('zoom-slider'),zoomVal=document.getElementById('zoom-val');
canvas.style.width=CW+'px';canvas.style.height=CH+'px';
svg.setAttribute('width',CW);svg.setAttribute('height',CH);
let tx=0,ty=0,scale=.4,dragging=false,startX=0,startY=0,hovered=null,filter='all';

function applyTransform(){
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  slider.value=Math.round(scale*100);zoomVal.textContent=Math.round(scale*100)+'%';
  canvas.classList.toggle('zoom-far',scale<0.4);
  svg.querySelectorAll('.edge-weak').forEach(p=>{p.style.display=scale<0.4?'none':'';});
  updateMinimap();
}
function fitView(){const cw=wrap.clientWidth;scale=(cw/CW)*.95;tx=(cw-CW*scale)/2;ty=10;applyTransform();}
function view100(){scale=1;tx=0;ty=0;applyTransform();}

sections.forEach(s=>{const d=document.createElement('div');d.className='section-bg'+(s.sub?' sub':'');d.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.w}px;height:${s.h}px;border:1px solid ${s.c}${s.sub?'18':'0e'};background:${s.c}${s.sub?'06':'04'}`;d.innerHTML=`<div class="label" style="color:${s.c}99">${s.l}</div>`;canvas.appendChild(d);});

const nodeEls={};
nodes.forEach(n=>{const[id,label,x,y,color,isIcon]=n;const d=document.createElement('div');d.className='node'+(isIcon?' icon':'');d.style.cssText=`left:${x}px;top:${y}px;border:${isIcon?2:1}px solid ${isIcon?C.highlight+'88':color+'30'}`;d.dataset.id=id;let inner='';if(isIcon)inner+=`<div class="star-badge">★</div>`;if(inCollection.has(id))inner+=`<div class="coll-badge">In Collection</div>`;const tech=techMap[id];if(tech){const lb={hibeat:'HB',springdrive:'SD',quartz:'Q'};inner+=`<div class="tech-badge ${tech}" title="${tech==='hibeat'?'Hi-Beat 36000 bph':tech==='springdrive'?'Spring Drive':'Quartz'}">${lb[tech]}</div>`;}inner+=`<div class="text">${label}</div><div class="bar" style="background:linear-gradient(90deg,transparent,${color},transparent)"></div>`;d.innerHTML=inner;d.addEventListener('mouseenter',()=>{hovered=id;updateHL();});d.addEventListener('mouseleave',()=>{hovered=null;updateHL();});canvas.appendChild(d);nodeEls[id]=d;});

function getPath(fn,tn){const fcx=fn[2]+NW/2,fcy=fn[3]+NH/2,tcx=tn[2]+NW/2,tcy=tn[3]+NH/2,dx=tcx-fcx,dy=tcy-fcy;let sx,sy,ex,ey;if(Math.abs(dx)>Math.abs(dy)){sx=dx>0?fn[2]+NW:fn[2];sy=fcy;ex=dx>0?tn[2]:tn[2]+NW;ey=tcy;}else{sx=fcx;sy=dy>0?fn[3]+NH:fn[3];ex=tcx;ey=dy>0?tn[3]:tn[3]+NH;}const mx=(sx+ex)/2,my=(sy+ey)/2;if(Math.abs(dx)>Math.abs(dy)){return`M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;}return`M${sx},${sy} C${sx},${my} ${ex},${my} ${ex},${ey}`;}

function renderEdges(){let h=`<defs><marker id="a" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="5" markerHeight="4" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="#aaa"/></marker><marker id="ah" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="5" markerHeight="4" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="${C.highlight}"/></marker><marker id="asd" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="5" markerHeight="4" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="#1c7ed6"/></marker></defs>`;edges.forEach(([f,t,type])=>{const fn=nodeMap[f],tn=nodeMap[t];if(!fn||!tn)return;const key=`${f}→${t}`,isSD=sdEdges.has(key),cls=isSD?'edge-sd':(type==='weak'?'edge-weak':'');h+=`<path class="${cls}" data-from="${f}" data-to="${t}" data-type="${type}" d="${getPath(fn,tn)}" fill="none" stroke="${isSD?'#1c7ed6':'#aaa'}" stroke-width="${type==='strong'?1.5:.8}" stroke-dasharray="${isSD?'6 3':(type==='weak'?'3,3':'0')}" opacity="${isSD?.6:(type==='weak'?.25:.45)}" marker-end="${isSD?'url(#asd)':'url(#a)'}"/>`;});svg.innerHTML=h;}

function isVis(n){if(filter==='all')return true;const c=n[4],id=n[0];if(filter==='suwa')return c===C.suwa;if(filter==='kameido')return c===C.kameido;if(filter==='diver')return c===C.diver||c===C.prospex;if(filter==='chrono')return c===C.chrono;if(filter==='gs')return c===C.gs;if(filter==='ks')return c===C.ks;if(filter==='modern')return c===C.prospex||c===C.presage||c===C.modern||([C.seiko5,C.chrono].includes(c)&&n[2]>1100);if(filter==='seiko5')return c===C.seiko5;if(filter==='collection')return inCollection.has(id);return true;}

function updateHL(){const conn=new Set();if(hovered)edges.forEach(([f,t])=>{if(f===hovered)conn.add(t);if(t===hovered)conn.add(f);});nodes.forEach(n=>{const el=nodeEls[n[0]],vis=isVis(n);el.classList.toggle('hidden-filter',!vis);if(hovered&&vis){const isH=n[0]===hovered,isC=conn.has(n[0]);el.classList.toggle('dimmed',!isH&&!isC);el.style.borderColor=isH?C.highlight:(n[5]?C.highlight+'88':n[4]+'30');el.style.boxShadow=isH?`0 4px 16px ${C.highlight}30`:'';}else if(vis){el.classList.remove('dimmed');el.style.borderColor=n[5]?C.highlight+'88':n[4]+'30';el.style.boxShadow='';}});svg.querySelectorAll('path[data-from]').forEach(p=>{const f=p.dataset.from,t=p.dataset.to,type=p.dataset.type,isSD=p.classList.contains('edge-sd');if(hovered&&(f===hovered||t===hovered)){p.setAttribute('stroke',C.highlight);p.setAttribute('opacity','.85');p.setAttribute('stroke-width','2.5');p.setAttribute('marker-end','url(#ah)');if(isSD)p.style.animation='none';}else if(hovered){p.setAttribute('stroke',isSD?'#1c7ed6':'#aaa');p.setAttribute('opacity','.04');p.setAttribute('stroke-width','.5');p.setAttribute('marker-end',isSD?'url(#asd)':'url(#a)');if(isSD)p.style.animation='';}else{p.setAttribute('stroke',isSD?'#1c7ed6':'#aaa');p.setAttribute('opacity',isSD?'.6':(type==='weak'?'.25':'.45'));p.setAttribute('stroke-width',type==='strong'?'1.5':'.8');p.setAttribute('marker-end',isSD?'url(#asd)':'url(#a)');if(isSD)p.style.animation='';}});}

[['all','All'],['suwa','Suwa/Early'],['kameido','Kameido'],['diver','⚓ Diver'],['chrono','⏱ Chrono'],['gs','Grand Seiko'],['ks','King Seiko'],['seiko5','Seiko 5'],['modern','Modern'],['collection','● My Collection']].forEach(([k,l])=>{const b=document.createElement('button');b.textContent=l;b.className=k==='all'?'active':'';b.onclick=()=>{filter=k;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');updateHL();};document.getElementById('filters').appendChild(b);});

const legendEl=document.getElementById('legend');
[[C.suwa,'Suwa'],[C.kameido,'Kameido'],[C.diver,'⚓ Diver'],[C.chrono,'⏱ Chrono'],[C.bell,'Bell-Matic'],[C.world,'World Time'],[C.seiko5,'Seiko 5'],[C.gs,'Grand Seiko'],[C.ks,'King Seiko'],[C.prospex,'Prospex'],[C.presage,'Presage'],[C.highlight,'★ Icon'],[C.collection,'● In Collection']].forEach(([c,l])=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<div class="dot" style="background:${c}"></div><span>${l}</span>`;legendEl.appendChild(d);});
legendEl.innerHTML+=`<div class="sep"></div>`;
[['var(--hibeat)','HB','Hi-Beat 36k'],['var(--springdrive)','SD','Spring Drive'],['var(--quartz)','Q','Quartz']].forEach(([bg,ab,tip])=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<div class="dot" style="background:${bg};border-radius:50%;width:8px;height:8px;font-size:5px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">${ab}</div><span>${tip}</span>`;legendEl.appendChild(d);});

/* ═══ MINIMAP ═══ */
const mmCanvas=document.getElementById('minimap-canvas'),mmCtx=mmCanvas.getContext('2d'),mmView=document.getElementById('mm-viewport'),mmC=document.getElementById('minimap');
const MM_W=180,MM_SC=MM_W/CW,MM_H=Math.round(CH*MM_SC);
mmCanvas.width=MM_W;mmCanvas.height=MM_H;mmCanvas.style.width=MM_W+'px';mmCanvas.style.height=MM_H+'px';mmC.style.width=MM_W+'px';mmC.style.height=MM_H+'px';
function drawMM(){mmCtx.clearRect(0,0,MM_W,MM_H);mmCtx.fillStyle='#f5f4f1';mmCtx.fillRect(0,0,MM_W,MM_H);sections.forEach(s=>{mmCtx.fillStyle=s.c+'12';mmCtx.strokeStyle=s.c+'30';mmCtx.lineWidth=.5;mmCtx.fillRect(s.x*MM_SC,s.y*MM_SC,s.w*MM_SC,s.h*MM_SC);mmCtx.strokeRect(s.x*MM_SC,s.y*MM_SC,s.w*MM_SC,s.h*MM_SC);});nodes.forEach(n=>{const owned=inCollection.has(n[0]);mmCtx.fillStyle=owned?C.collection:n[4];mmCtx.globalAlpha=owned?1:.5;mmCtx.fillRect(n[2]*MM_SC,n[3]*MM_SC,NW*MM_SC,NH*MM_SC);});mmCtx.globalAlpha=1;}
function updateMinimap(){const ww=wrap.clientWidth,wh=wrap.clientHeight,vx=(-tx)/scale,vy=(-ty)/scale,vw=ww/scale,vh=wh/scale;mmView.style.left=Math.max(0,vx*MM_SC)+'px';mmView.style.top=Math.max(0,vy*MM_SC)+'px';mmView.style.width=Math.min(MM_W,vw*MM_SC)+'px';mmView.style.height=Math.min(MM_H,vh*MM_SC)+'px';}
mmC.addEventListener('click',e=>{const r=mmC.getBoundingClientRect(),mx=(e.clientX-r.left)/MM_SC,my=(e.clientY-r.top)/MM_SC,ww=wrap.clientWidth,wh=wrap.clientHeight;tx=-(mx-ww/(2*scale))*scale;ty=-(my-wh/(2*scale))*scale;applyTransform();});
drawMM();

/* ═══ INTERACTION ═══ */
wrap.addEventListener('pointerdown',e=>{if(e.target.closest('.node'))return;dragging=true;startX=e.clientX-tx;startY=e.clientY-ty;wrap.classList.add('dragging');wrap.setPointerCapture(e.pointerId);});
wrap.addEventListener('pointermove',e=>{if(!dragging)return;tx=e.clientX-startX;ty=e.clientY-startY;applyTransform();});
wrap.addEventListener('pointerup',()=>{dragging=false;wrap.classList.remove('dragging');});
wrap.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.92:1.08,ns=Math.max(.15,Math.min(1.2,scale*d)),r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;applyTransform();},{passive:false});
let lastDist=0;wrap.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastDist=Math.sqrt(dx*dx+dy*dy);}});
wrap.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);scale=Math.max(.15,Math.min(1.2,scale*(dist/lastDist)));lastDist=dist;applyTransform();}},{passive:false});
slider.addEventListener('input',()=>{const ns=parseInt(slider.value)/100,cw=wrap.clientWidth,ch=wrap.clientHeight,cx=cw/2,cy=ch/2;tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;applyTransform();});
document.getElementById('btn-fit').onclick=fitView;
document.getElementById('btn-100').onclick=view100;
renderEdges();fitView();

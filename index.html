<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiko Mechanical Architecture 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Eksisterende CSS bevares, her tilføjes kun strukturelle udvidelser */
:root { --suwa: #1e3a5f; --diver: #0d6651; --bg: #faf9f7; --paper: #fff; --ink: #1a1a1a; --rule: #e0ddd6; }
body { margin: 0; background: var(--bg); font-family: 'IBM Plex Mono', monospace; overflow: hidden; display: flex; }
#app-core { flex: 1; display: flex; flex-direction: column; position: relative; }
#canvas-wrap { flex: 1; overflow: hidden; position: relative; cursor: grab; }
#canvas { position: absolute; transform-origin: 0 0; will-change: transform; }

/* Nyt Informationsmodul */
#info-panel {
    width: 320px; background: var(--paper); border-left: 1px solid var(--rule);
    transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; padding: 20px;
    box-shadow: -4px 0 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
}
#info-panel.active { transform: translateX(0); }
.info-header { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--ink); border-bottom: 1px solid var(--rule); padding-bottom: 10px; margin-bottom: 15px; }
.spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px; }
.spec-label { color: #8a8780; text-transform: uppercase; font-size: 9px; letter-spacing: 1px; }
.spec-value { font-weight: 500; }
.close-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; border: none; background: transparent; font-size: 16px; }
</style>
</head>
<body>
<div id="app-core">
    <div id="canvas-wrap"><div id="canvas"><svg id="edges-svg"></svg></div></div>
</div>

<aside id="info-panel">
    <button class="close-btn" onclick="closePanel()">×</button>
    <div class="info-header" id="ip-title">Reference</div>
    <div class="spec-grid" id="ip-specs"></div>
    <p style="margin-top: 20px; font-size: 11px; line-height: 1.5; color: #555;" id="ip-desc"></p>
</aside>

<script>
// Facet 1: Dataafkobling (JSON Struktur)
// Konvertering fra [id, label, x, y, color] til skalerbare objekter
const seikoData = {
    nodes: [
        { id: "62mas", label: "62MAS\n(6217) 1965", x: 70, y: 940, color: "var(--diver)", icon: true,
          specs: { caliber: "6217A", bph: 18000, dimensions: "37mm", production: "1965-1968" },
          desc: "Seikos første professionelle dykkerur, udviklet til den 8. Japanske Antarktiske Forskningskspedition." },
        { id: "6105_willard", label: "6105-8110\n'Willard'", x: 530, y: 940, color: "var(--diver)", icon: true,
          specs: { caliber: "6105B", bph: 21600, dimensions: "44mm", production: "1970-1977" },
          desc: "Ikonisk asymmetrisk kasse, der opnåede kultstatus via filmen Apocalypse Now." }
        // ... Resterende noder indsættes her
    ],
    edges: [
        { from: "62mas", to: "6105_willard", type: "strong" }
    ]
};

// Facet 3: Kinetisk Optimering (requestAnimationFrame)
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('canvas');
let tx = 0, ty = 0, scale = 0.5, dragging = false, startX = 0, startY = 0;
let ticking = false; // Sikrer at rendering ikke overstiger skærmens opdateringshastighed

function applyTransform() {
    canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

wrap.addEventListener('pointerdown', e => {
    if(e.target.closest('.node')) return;
    dragging = true; startX = e.clientX - tx; startY = e.clientY - ty;
    wrap.style.cursor = 'grabbing'; wrap.setPointerCapture(e.pointerId);
});

wrap.addEventListener('pointermove', e => {
    if (!dragging) return;
    if (!ticking) {
        window.requestAnimationFrame(() => {
            tx = e.clientX - startX;
            ty = e.clientY - startY;
            applyTransform();
            ticking = false;
        });
        ticking = true;
    }
});

wrap.addEventListener('pointerup', () => { dragging = false; wrap.style.cursor = 'grab'; });

// Håndtering af Informationsmodulet
function openPanel(nodeData) {
    const panel = document.getElementById('info-panel');
    document.getElementById('ip-title').innerText = nodeData.label.replace('\n', ' ');
    
    let specsHtml = '';
    for (const [key, val] of Object.entries(nodeData.specs || {})) {
        specsHtml += `<div><div class="spec-label">${key}</div><div class="spec-value">${val}</div></div>`;
    }
    document.getElementById('ip-specs').innerHTML = specsHtml;
    document.getElementById('ip-desc').innerText = nodeData.desc || 'Ingen yderligere historik tilgængelig.';
    
    panel.classList.add('active');
}

function closePanel() {
    document.getElementById('info-panel').classList.remove('active');
}

// Rendering Logic (Forkortet for overblik)
seikoData.nodes.forEach(n => {
    const d = document.createElement('div');
    d.className = 'node' + (n.icon ? ' icon' : '');
    d.style.cssText = `left:${n.x}px; top:${n.y}px; border-color:${n.color}; position: absolute; padding: 10px; background: white; cursor: pointer;`;
    d.innerText = n.label;
    
    // Aktivering af facet 2
    d.addEventListener('click', () => openPanel(n));
    canvas.appendChild(d);
});
applyTransform();
</script>
</body>
</html>

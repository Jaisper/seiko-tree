  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    background: linear-gradient(180deg, #0c0c0eee 70%, transparent);
    padding: 10px 14px 20px;
  }
  #topbar .title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #topbar .eyebrow { font-size: 9px; letter-spacing: 3px; color: #666; }
  #topbar h1 { font-family: 'Instrument Serif', serif; font-size: 20px; color: #e8e4dc; font-weight: 400; margin: 0; }
  #topbar .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  #topbar button {
    font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 10px;
    background: transparent; color: #888; border: 1px solid #333;
    border-radius: 3px; cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  #topbar button.active { background: #e8e4dc; color: #0c0c0e; border-color: #e8e4dc; }
  #topbar button:hover:not(.active) { border-color: #666; color: #ccc; }

  /* Legend */
  #legend {
    position: absolute; bottom: 10px; left: 10px; z-index: 10;
    background: #181818ee; border-radius: 4px; padding: 6px 10px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  #legend .item { display: flex; align-items: center; gap: 4px; }
  #legend .dot { width: 8px; height: 8px; border-radius: 1px; }
  #legend span { font-size: 9px; color: #999; }

  /* Zoom info */
  #zoominfo {
    position: absolute; bottom: 10px; right: 10px; z-index: 10;
    font-size: 9px; color: #555; background: #181818ee;
    border-radius: 4px; padding: 4px 8px;
  }

  /* Canvas */
  #canvas-wrap {
    width: 100%; height: 100%; cursor: grab; touch-action: none;
    overflow: hidden; position: relative;
  }
  #canvas-wrap.dragging { cursor: grabbing; }
  #canvas {
    position: absolute; transform-origin: 0 0;
    width: 1200px; height: 1900px;
  }

  /* Sections */
  .section-bg {
    position: absolute; border-radius: 6px; pointer-events: none;
  }
  .section-bg .label {
    position: absolute; top: 4px; left: 12px;
    font-size: 11px; letter-spacing: 2px; font-weight: 500;
    background: #0c0c0e; padding: 0 6px;
  }
  .section-bg.sub .label { font-size: 9px; letter-spacing: 1px; top: -1px; left: 8px; }

  /* Nodes */
  .node {
    position: absolute; width: 128px; min-height: 48px;
    background: #111114; border-radius: 4px; padding: 6px 8px;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; cursor: default;
    transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .node .text {
    font-size: 10px; color: #ccc; line-height: 1.3;
    text-align: center; white-space: pre-line;
  }
  .node.icon { border-width: 2px; }
  .node.icon .text { font-weight: 500; }
  .node .bar {
    width: 100%; height: 2px; margin-top: 3px;
    border-radius: 1px; opacity: 0.5;
  }
  .node .star-badge {
    position: absolute; top: -1px; right: 6px;
    background: #c8a94e; color: #0c0c0e;
    font-size: 7px; padding: 0 4px; border-radius: 0 0 2px 2px;
    font-weight: 500; letter-spacing: 0.5px;
  }
  .node:hover { background: #1a1a1e; }
  .node:hover .text { color: #fff; }
  .node:hover .bar { opacity: 1; }
  .node.dimmed { opacity: 0.15; }
  .node.hidden-filter { opacity: 0.08; pointer-events: none; }
  .node.highlighted { box-shadow: 0 0 16px #c8a94e40; }

  /* Collection badge */
  .node .coll-badge {
    position: absolute; top: -1px; left: 6px;
    background: #4a9e3a; color: #fff;
    font-size: 7px; padding: 0 4px; border-radius: 0 0 2px 2px;
    font-weight: 500; letter-spacing: 0.5px;
  }

  /* SVG */
  #edges-svg {
    position: absolute; top: 0; left: 0; pointer-events: none;
    width: 1200px; height: 1900px;
  }
</style>

// Edges SVG
function getEdgePath(fn, tn) {
  const fx1 = fn[2], fy1 = fn[3], tx1 = tn[2], ty1 = tn[3];
  const fcx = fx1 + NW/2, fcy = fy1 + NH/2;
  const tcx = tx1 + NW/2, tcy = ty1 + NH/2;
  const dx = tcx - fcx, dy = tcy - fcy;
  
  let sx, sy, ex, ey;
  if (Math.abs(dx) > Math.abs(dy)) {
    sx = dx > 0 ? fx1 + NW : fx1;
    sy = fcy;
    ex = dx > 0 ? tx1 : tx1 + NW;
    ey = tcy;
  } else {
    sx = fcx; sy = dy > 0 ? fy1 + NH : fy1;
    ex = tcx; ey = dy > 0 ? ty1 : ty1 + NH;
  }
  
  if (Math.abs(dx) > 20 && Math.abs(dy) > 20) {
    const mx = (sx+ex)/2;
    return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
  }
  return `M${sx},${sy} L${ex},${ey}`;
}

function renderEdges() {
  let html = `<defs>
    <marker id="arr" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="6" markerHeight="5" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arr-hi" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="6" markerHeight="5" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="${C.highlight}"/></marker>
  </defs>`;
  
  edges.forEach(([fid, tid, type]) => {
    const fn = nodeMap[fid], tn = nodeMap[tid];
    if (!fn || !tn) return;
    const path = getEdgePath(fn, tn);
    const sw = type === 'strong' ? 2 : 1;
    const da = type === 'weak' ? '4,4' : '0';
    const op = type === 'weak' ? 0.4 : 0.6;
    html += `<path data-from="${fid}" data-to="${tid}" d="${path}" fill="none" stroke="#555" stroke-width="${sw}" stroke-dasharray="${da}" opacity="${op}" marker-end="url(#arr)"/>`;
  });
  
  svg.innerHTML = html;
}

function isVisible(n) {
  if (filter === 'all') return true;
  const col = n[4];
  if (filter === 'suwa') return col === C.suwa || col === C.seiko5;
  if (filter === 'kameido') return col === C.kameido;
  if (filter === 'diver') return col === C.diver;
  if (filter === 'chrono') return col === C.chrono;
  if (filter === 'special') return col === C.bell || col === C.world;
  if (filter === 'collection') return inCollection.has(n[0]);
  return true;
}

function updateHighlights() {
  const connected = new Set();
  if (hovered) {
    edges.forEach(([f,t]) => {
      if (f === hovered) connected.add(t);
      if (t === hovered) connected.add(f);
    });
  }
  
  nodes.forEach(n => {
    const el = nodeEls[n[0]];
    const vis = isVisible(n);
    el.classList.toggle('hidden-filter', !vis);
    
    if (hovered && vis) {
      const isH = n[0] === hovered;
      const isC = connected.has(n[0]);
      el.classList.toggle('dimmed', !isH && !isC);
      el.classList.toggle('highlighted', isH);
      if (isH) {
        el.style.borderColor = C.highlight;
        el.style.boxShadow = `0 0 16px ${C.highlight}40`;
      } else {
        el.style.borderColor = n[5] ? C.highlight+'aa' : n[4]+'66';
        el.style.boxShadow = n[5] ? `0 0 8px ${C.highlight}15` : 'none';
      }
    } else if (vis) {
      el.classList.remove('dimmed','highlighted');
      el.style.borderColor = n[5] ? C.highlight+'aa' : n[4]+'66';
      el.style.boxShadow = n[5] ? `0 0 8px ${C.highlight}15` : 'none';
    }
  });
  
  // Update edge highlights
  svg.querySelectorAll('path[data-from]').forEach(p => {
    const f = p.dataset.from, t = p.dataset.to;
    if (hovered && (f === hovered || t === hovered)) {
      p.setAttribute('stroke', C.highlight);
      p.setAttribute('opacity', '1');
      p.setAttribute('marker-end', 'url(#arr-hi)');
    } else if (hovered) {
      p.setAttribute('stroke', '#555');
      p.setAttribute('opacity', '0.1');
      p.setAttribute('marker-end', 'url(#arr)');
    } else {
      const type = edges.find(e => e[0]===f && e[1]===t);
      p.setAttribute('stroke', '#555');
      p.setAttribute('opacity', type && type[2]==='weak' ? '0.4' : '0.6');
      p.setAttribute('marker-end', 'url(#arr)');
    }
  });
}

// Filters
const filterDefs = [
  ['all','Alle'],['suwa','Suwa'],['kameido','Kameido'],
  ['diver','⚓ Dykker'],['chrono','⏱ Krono'],['special','Speciel'],
  ['collection','🟢 Min samling']
];
const filtersEl = document.getElementById('filters');
filterDefs.forEach(([k,l]) => {
  const btn = document.createElement('button');
  btn.textContent = l;
  btn.className = k === 'all' ? 'active' : '';
  btn.onclick = () => {
    filter = k;
    filtersEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateHighlights();
  };
  filtersEl.appendChild(btn);
});

// Reset button
const resetBtn = document.createElement('button');
resetBtn.textContent = 'Reset Zoom';
resetBtn.onclick = resetView;
filtersEl.appendChild(resetBtn);

// Legend
const legendDefs = [
  [C.suwa,'Suwa'],[C.kameido,'Kameido'],[C.diver,'⚓ Dykker'],
  [C.chrono,'⏱ Kronograf'],[C.bell,'🔔 Bell-Matic'],[C.world,'🌍 World Time'],
  [C.seiko5,'Seiko 5'],[C.highlight,'★ Ikon'],[C.collection,'🟢 I samling'],
];
const legendEl = document.getElementById('legend');
legendDefs.forEach(([c,l]) => {
  const d = document.createElement('div');
  d.className = 'item';
  d.innerHTML = `<div class="dot" style="background:${c}"></div><span>${l}</span>`;
  legendEl.appendChild(d);
});

// Pan & Zoom
wrap.addEventListener('pointerdown', e => {
  if (e.target.closest('.node')) return;
  dragging = true;
  startX = e.clientX - tx;
  startY = e.clientY - ty;
  wrap.classList.add('dragging');
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener('pointermove', e => {
  if (!dragging) return;
  tx = e.clientX - startX;
  ty = e.clientY - startY;
  applyTransform();
});
wrap.addEventListener('pointerup', () => {
  dragging = false;
  wrap.classList.remove('dragging');
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? 0.92 : 1.08;
  const ns = Math.max(0.18, Math.min(1.5, scale * d));
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * (ns / scale);
  ty = my - (my - ty) * (ns / scale);
  scale = ns;
  applyTransform();
}, { passive: false });

// Touch pinch zoom
let lastDist = 0;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.sqrt(dx*dx + dy*dy);
  }
});
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const d = dist / lastDist;
    scale = Math.max(0.18, Math.min(1.5, scale * d));
    lastDist = dist;
    applyTransform();
  }
}, { passive: false });

// Init
renderEdges();
resetView();
</script>
</body>
</html>

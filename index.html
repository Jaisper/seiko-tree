<html lang="en">
<head>
<meta charset="UTF-8">

<title>The Complete Seiko Mechanical Family Tree 1960–1980</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--suwa:#1e3a5f;--kameido:#7a2332;--diver:#0d6651;--chrono:#9e6b00;--bell:#6d3a7a;--world:#2d7a53;--seiko5:#3d6d1e;--icon:#b8942e;--coll:#2d8a3e;--bg:#faf9f7;--paper:#fff;--ink:#1a1a1a;--muted:#8a8780;--rule:#e0ddd6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'IBM Plex Mono',monospace;color:var(--ink);overflow:hidden}
#app{width:100vw;height:100vh;display:flex;flex-direction:column}
#header{padding:12px 20px 10px;border-bottom:1px solid var(--rule);background:var(--paper);z-index:20;flex-shrink:0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#header .eyebrow{font-size:8px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
#header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--ink);letter-spacing:.5px;line-height:1.2}
#header .spacer{flex:1}
.filters{display:flex;gap:4px;flex-wrap:wrap}
.filters button{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:4px 10px;background:transparent;color:var(--muted);border:1px solid var(--rule);border-radius:2px;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.filters button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.filters button:hover:not(.active){border-color:var(--muted);color:var(--ink)}
#toolbar{padding:6px 20px;border-bottom:1px solid var(--rule);background:var(--paper);z-index:20;flex-shrink:0;display:flex;align-items:center;gap:12px}
#toolbar label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
#zoom-slider{-webkit-appearance:none;appearance:none;width:200px;height:3px;background:var(--rule);border-radius:2px;outline:none;cursor:pointer}
#zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.2)}
#zoom-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--ink);cursor:pointer;border:2px solid var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.2)}
#zoom-val{font-size:10px;color:var(--muted);min-width:32px}
#toolbar .sep{width:1px;height:16px;background:var(--rule)}
.tbtn{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 8px;background:transparent;color:var(--muted);border:1px solid var(--rule);border-radius:2px;cursor:pointer;transition:all .15s}
.tbtn:hover{border-color:var(--ink);color:var(--ink)}
#legend{position:absolute;bottom:8px;left:12px;z-index:15;background:var(--paper);border:1px solid var(--rule);border-radius:3px;padding:6px 12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
#legend .item{display:flex;align-items:center;gap:4px}
#legend .dot{width:8px;height:8px;border-radius:1px}
#legend span{font-size:8px;color:var(--muted);letter-spacing:.5px}
#canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab;touch-action:none;background:var(--bg);background-image:radial-gradient(circle,#d8d5ce .5px,transparent .5px);background-size:24px 24px}
#canvas-wrap.dragging{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0;width:1200px;height:1900px}
.section-bg{position:absolute;border-radius:4px;pointer-events:none}
.section-bg .label{position:absolute;top:-8px;left:10px;font-size:9px;letter-spacing:2px;font-weight:500;background:var(--bg);padding:0 6px}
.section-bg.sub .label{font-size:8px;letter-spacing:1px;top:-7px;left:8px}
.node{position:absolute;width:130px;min-height:46px;background:var(--paper);border-radius:3px;padding:6px 8px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:default;transition:opacity .2s,border-color .2s,box-shadow .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.node .text{font-size:9.5px;color:var(--ink);line-height:1.3;text-align:center;white-space:pre-line}
.node.icon{border-width:2px!important}
.node.icon .text{font-weight:600}
.node .bar{width:100%;height:2px;margin-top:4px;border-radius:1px;opacity:.4}
.node .star-badge{position:absolute;top:-1px;right:6px;background:var(--icon);color:var(--paper);font-size:7px;padding:0 4px;border-radius:0 0 2px 2px;font-weight:500}
.node .coll-badge{position:absolute;top:-1px;left:6px;background:var(--coll);color:var(--paper);font-size:6.5px;padding:0 4px;border-radius:0 0 2px 2px;font-weight:500;text-transform:uppercase}
.node:hover{box-shadow:0 2px 12px rgba(184,148,46,.12)}
.node:hover .bar{opacity:1}
.node.dimmed{opacity:.12}
.node.hidden-filter{opacity:.05;pointer-events:none}
#edges-svg{position:absolute;top:0;left:0;pointer-events:none;width:1200px;height:1900px}
</style>
</head>

function getPath(fn,tn){const fcx=fn[2]+NW/2,fcy=fn[3]+NH/2,tcx=tn[2]+NW/2,tcy=tn[3]+NH/2,dx=tcx-fcx,dy=tcy-fcy;let sx,sy,ex,ey;if(Math.abs(dx)>Math.abs(dy)){sx=dx>0?fn[2]+NW:fn[2];sy=fcy;ex=dx>0?tn[2]:tn[2]+NW;ey=tcy;}else{sx=fcx;sy=dy>0?fn[3]+NH:fn[3];ex=tcx;ey=dy>0?tn[3]:tn[3]+NH;}if(Math.abs(dx)>20&&Math.abs(dy)>20){const mx=(sx+ex)/2;return`M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;}return`M${sx},${sy} L${ex},${ey}`;}

function renderEdges(){let h=`<defs><marker id="a" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="5" markerHeight="4" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="#aaa"/></marker><marker id="ah" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="5" markerHeight="4" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="${C.highlight}"/></marker></defs>`;edges.forEach(([f,t,type])=>{const fn=nodeMap[f],tn=nodeMap[t];if(!fn||!tn)return;h+=`<path data-from="${f}" data-to="${t}" d="${getPath(fn,tn)}" fill="none" stroke="#aaa" stroke-width="${type==='strong'?1.5:.8}" stroke-dasharray="${type==='weak'?'3,3':'0'}" opacity="${type==='weak'?.3:.5}" marker-end="url(#a)"/>`;});svg.innerHTML=h;}

function isVis(n){if(filter==='all')return true;const c=n[4];if(filter==='suwa')return c===C.suwa||c===C.seiko5;if(filter==='kameido')return c===C.kameido;if(filter==='diver')return c===C.diver;if(filter==='chrono')return c===C.chrono;if(filter==='special')return c===C.bell||c===C.world;if(filter==='collection')return inCollection.has(n[0]);return true;}

function updateHL(){const conn=new Set();if(hovered)edges.forEach(([f,t])=>{if(f===hovered)conn.add(t);if(t===hovered)conn.add(f);});nodes.forEach(n=>{const el=nodeEls[n[0]],vis=isVis(n);el.classList.toggle('hidden-filter',!vis);if(hovered&&vis){const isH=n[0]===hovered,isC=conn.has(n[0]);el.classList.toggle('dimmed',!isH&&!isC);el.style.borderColor=isH?C.highlight:(n[5]?C.highlight+'88':n[4]+'30');el.style.boxShadow=isH?`0 4px 20px ${C.highlight}30`:'';}else if(vis){el.classList.remove('dimmed');el.style.borderColor=n[5]?C.highlight+'88':n[4]+'30';el.style.boxShadow='';}});svg.querySelectorAll('path[data-from]').forEach(p=>{const f=p.dataset.from,t=p.dataset.to;if(hovered&&(f===hovered||t===hovered)){p.setAttribute('stroke',C.highlight);p.setAttribute('opacity','.9');p.setAttribute('stroke-width','2');p.setAttribute('marker-end','url(#ah)');}else if(hovered){p.setAttribute('stroke','#aaa');p.setAttribute('opacity','.06');p.setAttribute('stroke-width','.8');p.setAttribute('marker-end','url(#a)');}else{const e=edges.find(e=>e[0]===f&&e[1]===t);p.setAttribute('stroke','#aaa');p.setAttribute('opacity',e&&e[2]==='weak'?'.3':'.5');p.setAttribute('stroke-width',e&&e[2]==='strong'?'1.5':'.8');p.setAttribute('marker-end','url(#a)');}});}

[['all','All'],['suwa','Suwa'],['kameido','Kameido'],['diver','⚓ Diver'],['chrono','⏱ Chrono'],['special','Special'],['collection','● My Collection']].forEach(([k,l])=>{const b=document.createElement('button');b.textContent=l;b.className=k==='all'?'active':'';b.onclick=()=>{filter=k;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');updateHL();};document.getElementById('filters').appendChild(b);});
[[C.suwa,'Suwa'],[C.kameido,'Kameido'],[C.diver,'⚓ Diver'],[C.chrono,'⏱ Chronograph'],[C.bell,'🔔 Bell-Matic'],[C.world,'🌍 World Time'],[C.seiko5,'Seiko 5'],[C.highlight,'★ Icon'],[C.collection,'● In Collection']].forEach(([c,l])=>{const d=document.createElement('div');d.className='item';d.innerHTML=`<div class="dot" style="background:${c}"></div><span>${l}</span>`;document.getElementById('legend').appendChild(d);});

wrap.addEventListener('pointerdown',e=>{if(e.target.closest('.node'))return;dragging=true;startX=e.clientX-tx;startY=e.clientY-ty;wrap.classList.add('dragging');wrap.setPointerCapture(e.pointerId);});
wrap.addEventListener('pointermove',e=>{if(!dragging)return;tx=e.clientX-startX;ty=e.clientY-startY;applyTransform();});
wrap.addEventListener('pointerup',()=>{dragging=false;wrap.classList.remove('dragging');});
wrap.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.92:1.08,ns=Math.max(.18,Math.min(1.5,scale*d)),r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;applyTransform();},{passive:false});
let lastDist=0;wrap.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastDist=Math.sqrt(dx*dx+dy*dy);}});
wrap.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);scale=Math.max(.18,Math.min(1.5,scale*(dist/lastDist)));lastDist=dist;applyTransform();}},{passive:false});
slider.addEventListener('input',()=>{const ns=parseInt(slider.value)/100,cw=wrap.clientWidth,ch=wrap.clientHeight,cx=cw/2,cy=ch/2;tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;applyTransform();});
document.getElementById('btn-fit').onclick=fitView;
document.getElementById('btn-100').onclick=view100;
renderEdges();fitView();
</script>
</body>
</html>
